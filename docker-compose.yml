version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: erv_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: erv_db
    volumes:
      - erv_pgdata:/var/lib/postgresql/data

volumes:
  erv_pgdata:
